[project]
name = "workshop-naive-agent"
version = "1.0.0"
description = "Pattern 1: agent runs in-process inside the web request."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "workshop-agent",
    "workshop-db",
    "workshop-ui",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/naive_agent"]
