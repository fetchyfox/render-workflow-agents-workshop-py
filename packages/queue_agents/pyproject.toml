[project]
name = "workshop-queue-agents"
version = "1.0.0"
description = "Pattern 2: thin web producer + background worker over a Valkey queue."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "redis[hiredis]>=5.2",
    "workshop-agent",
    "workshop-db",
    "workshop-ui",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/queue_agents"]
