[project]
name = "workshop-workflow-agents"
version = "1.0.0"
description = "Pattern 3: each agent is a Render Workflow task with managed orchestration."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "render-sdk>=0.6",
    "workshop-agent",
    "workshop-db",
    "workshop-ui",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflow_agents"]
